<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="PixelRepel">
  <meta property="og:description" content="Visual experiment with an image that reacts to the cursor and ripple on click.">
  <meta property="og:image" content="https://i.imgur.com/DMQP4PB.png">
  <meta property="og:type" content="website">
  <title>PixelRepel</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1115;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(20,20,25,.85);
      border: 1px solid rgba(255,255,255,.08);
      padding: 12px 14px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }

    .ui label {
      background: #1e2633;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: .2s;
      border: 1px solid rgba(255,255,255,.08);
    }

    .ui label:hover {
      background: #2a3547;
    }

    .ui input[type="file"] {
      display: none;
    }

    .debug-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 230px;
      height: 100%;
      overflow-y: auto;
      background: rgba(14,16,20,.95);
      border-left: 1px solid rgba(255,255,255,.07);
      padding: 20px 16px 40px;
      z-index: 20;
      color: #c9d1d9;
      font-size: 13px;
    }

    .debug-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #8b949e;
      margin: 0 0 16px;
    }

    .debug-option {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
    }

    .debug-option input[type="checkbox"] {
      accent-color: #c4c4c4;
      width: 15px;
      height: 15px;
    }

    .debug-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 14px 0;
    }

    .debug-section {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #8b949e;
      margin: 0 0 10px;
    }

    .debug-slider {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }

    .debug-slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .debug-slider output {
      font-variant-numeric: tabular-nums;
      color: #c4c4c4;
      font-weight: 600;
    }

    .debug-slider input[type="range"] {
      width: 100%;
      accent-color: #c4c4c4;
    }

    .debug-slider.muted {
      opacity: .4;
      pointer-events: none;
    }

    .mesh-stats {
      font-size: 11px;
      color: #8b949e;
      margin: 2px 0 0;
    }

    .hint {
      position: fixed;
      bottom: 18px;
      left: calc((100vw) / 2);
      transform: translateX(-50%);
      color: #c9d1d9;
      background: rgba(20,20,25,.7);
      border: 1px solid rgba(255,255,255,.08);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="ui">
    <label for="fileInput">Escolher imagem</label>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <canvas id="canvas"></canvas>

  <aside class="debug-panel">
    <p class="debug-title">Debug</p>

    <label class="debug-option">
      <input type="checkbox" id="chkMesh">
      <span>Show mesh</span>
    </label>

    <label class="debug-option">
      <input type="checkbox" id="chkPoly">
      <span>Show polygons</span>
    </label>

    <label class="debug-option">
      <input type="checkbox" id="chkSpread">
      <span>Spread</span>
    </label>

    <div class="debug-slider muted" id="gapSlider">
      <div class="debug-slider-row">Gap <output id="outGap">42</output></div>
      <input type="range" id="sldGap" min="0" max="140" value="42">
    </div>

    <div class="debug-divider"></div>
    <p class="debug-section">Mesh</p>

    <div class="debug-slider">
      <div class="debug-slider-row">Columns <output id="outCols">64</output></div>
      <input type="range" id="sldCols" min="4" max="256" value="64">
    </div>

    <div class="debug-slider">
      <div class="debug-slider-row">Rows <output id="outRows">64</output></div>
      <input type="range" id="sldRows" min="4" max="256" value="64">
    </div>

    <p class="mesh-stats" id="meshStats">32768 triangles · 16384 cells</p>

    <div class="debug-divider"></div>
    <p class="debug-section">Repel</p>

    <div class="debug-slider">
      <div class="debug-slider-row">Radius <output id="outRadius">85</output></div>
      <input type="range" id="sldRadius" min="20" max="400" value="85">
    </div>

    <div class="debug-slider">
      <div class="debug-slider-row">Strength <output id="outStrength">6</output></div>
      <input type="range" id="sldStrength" min="1" max="60" value="6">
    </div>

    <div class="debug-divider"></div>
    <p class="debug-section">Ripple</p>

    <div class="debug-slider">
      <div class="debug-slider-row">Strength <output id="outRStr">2</output></div>
      <input type="range" id="sldRStr" min="1" max="30" value="2">
    </div>

    <div class="debug-slider">
      <div class="debug-slider-row">Speed <output id="outRSpd">10</output></div>
      <input type="range" id="sldRSpd" min="2" max="40" value="10">
    </div>
  </aside>

  <div class="hint">Mouse = repulsão | Clique = ripple</div>

  <script>
    const PANEL_W = 230;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });

    const cfg = {
      cols: 64,
      rows: 64,
      repelRadius: 85,
      repelStrength: 6,
      spread: false,
      gap: 42,
      returnStr: 0.16,
      friction: 0.82,
      rippleStr: 6,
      rippleSpd: 10,
      rippleWidth: 30,
      rippleMaxR: 500,
      maxRipples: 24,
      showMesh: false,
      showPoly: false,
      maxArea: 0.78,
      alphaThresh: 20,
      jitterAmount: 0.18
    };

    function wireRange(id, outId, key, rebuild = false) {
      const el = document.getElementById(id);
      const out = document.getElementById(outId);

      el.addEventListener("input", () => {
        cfg[key] = Number(el.value);
        out.textContent = el.value;

        if (rebuild && currentImg) buildFromImage(currentImg);
        if (key === "cols" || key === "rows") updateStats();
      });
    }

    wireRange("sldCols", "outCols", "cols", true);
    wireRange("sldRows", "outRows", "rows", true);
    wireRange("sldGap", "outGap", "gap", true);
    wireRange("sldRadius", "outRadius", "repelRadius");
    wireRange("sldStrength", "outStrength", "repelStrength");
    wireRange("sldRStr", "outRStr", "rippleStr");
    wireRange("sldRSpd", "outRSpd", "rippleSpd");

    document.getElementById("chkMesh").onchange = e => {
      cfg.showMesh = e.target.checked;
      markActive();
    };

    document.getElementById("chkPoly").onchange = e => {
      cfg.showPoly = e.target.checked;
      markActive();
    };

    document.getElementById("chkSpread").onchange = e => {
      cfg.spread = e.target.checked;
      document.getElementById("gapSlider").classList.toggle("muted", !cfg.spread);
      if (currentImg) buildFromImage(currentImg);
    };

    function updateStats() {
      document.getElementById("meshStats").textContent =
        `${cfg.cols * cfg.rows * 2} triangles · ${cfg.cols * cfg.rows} cells`;
    }

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function getCanvasMouse(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((e.clientX - rect.left) / rect.width) * canvas.width,
        y: ((e.clientY - rect.top) / rect.height) * canvas.height
      };
    }

    let cells = [];
    let ripples = [];
    let currentImg = null;
    let animId = null;
    let isAnim = false;
    let keepUntil = 0;

    const mouse = {
      x: -90000,
      y: -90000,
      active: false
    };

    class Cell {
      constructor(bx, by, w, h, img, sx, sy, sw, sh, jitterX = 0, jitterY = 0) {
        this.bx = bx;
        this.by = by;
        this.x = bx;
        this.y = by;
        this.vx = 0;
        this.vy = 0;
        this.w = w;
        this.h = h;
        this.img = img;
        this.sx = sx;
        this.sy = sy;
        this.sw = sw;
        this.sh = sh;
        this.jitterX = jitterX;
        this.jitterY = jitterY;
      }

      update() {
        const cx = this.x + this.w * 0.5 + this.jitterX;
        const cy = this.y + this.h * 0.5 + this.jitterY;

        if (mouse.active) {
          const dx = cx - mouse.x;
          const dy = cy - mouse.y;
          const d2 = dx * dx + dy * dy;
          const r = cfg.repelRadius;

          if (d2 < r * r) {
            const d = Math.sqrt(d2) || 0.001;
            const t = 1 - (d / r);
            const f = smoothstep(t);

            this.vx += (dx / d) * f * cfg.repelStrength;
            this.vy += (dy / d) * f * cfg.repelStrength;
          }
        }

        for (const rp of ripples) {
          const dx = cx - rp.x;
          const dy = cy - rp.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const band = Math.abs(d - rp.radius);

          if (band < cfg.rippleWidth) {
            const inf = (1 - band / cfg.rippleWidth) * rp.life;
            this.vx += (dx / d) * inf * rp.strength;
            this.vy += (dy / d) * inf * rp.strength;
          }
        }

        this.vx += (this.bx - this.x) * cfg.returnStr;
        this.vy += (this.by - this.y) * cfg.returnStr;

        this.vx *= cfg.friction;
        this.vy *= cfg.friction;

        this.x += this.vx;
        this.y += this.vy;
      }

      moving() {
        return (
          Math.abs(this.vx) > 0.03 ||
          Math.abs(this.vy) > 0.03 ||
          Math.abs(this.x - this.bx) > 0.15 ||
          Math.abs(this.y - this.by) > 0.15
        );
      }

      snap() {
        if (!this.moving()) {
          this.x = this.bx;
          this.y = this.by;
          this.vx = 0;
          this.vy = 0;
        }
      }

      draw() {
        ctx.drawImage(
          this.img,
          this.sx, this.sy, this.sw, this.sh,
          this.x, this.y, this.w, this.h
        );
      }
    }

    class Ripple {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.strength = cfg.rippleStr;
        this.life = 1;
      }

      update() {
        this.radius += cfg.rippleSpd;
        this.life *= 0.985;
      }

      dead() {
        return this.radius > cfg.rippleMaxR || this.life < 0.05;
      }

      draw() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.14 * this.life})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }
    }

    function buildFromImage(img) {
      currentImg = img;
      cells = [];

      const cols = cfg.cols;
      const rows = cfg.rows;
      const gap = cfg.spread ? cfg.gap : 0;

      const maxW = canvas.width * cfg.maxArea;
      const maxH = canvas.height * cfg.maxArea;
      const asp = img.naturalWidth / img.naturalHeight;

      let artW, artH;
      if (maxW / maxH > asp) {
        artH = maxH;
        artW = artH * asp;
      } else {
        artW = maxW;
        artH = artW / asp;
      }

      const cellW = (artW - gap * (cols - 1)) / cols;
      const cellH = (artH - gap * (rows - 1)) / rows;
      const sx0 = (canvas.width - artW) / 2;
      const sy0 = (canvas.height - artH) / 2;

      const srcW = img.naturalWidth / cols;
      const srcH = img.naturalHeight / rows;

      const tc = document.createElement("canvas");
      tc.width = cols;
      tc.height = rows;
      const tx = tc.getContext("2d", { willReadFrequently: true });

      tx.imageSmoothingEnabled = true;
      tx.imageSmoothingQuality = "high";
      tx.drawImage(img, 0, 0, cols, rows);

      const alpha = tx.getImageData(0, 0, cols, rows).data;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (alpha[((r * cols) + c) * 4 + 3] <= cfg.alphaThresh) continue;

          const jitterBase = Math.min(cellW, cellH) * cfg.jitterAmount;
          const jitterX = (Math.random() - 0.5) * jitterBase;
          const jitterY = (Math.random() - 0.5) * jitterBase;

          cells.push(new Cell(
            sx0 + c * (cellW + gap),
            sy0 + r * (cellH + gap),
            cellW,
            cellH,
            img,
            c * srcW,
            r * srcH,
            srcW,
            srcH,
            jitterX,
            jitterY
          ));
        }
      }

      markActive(300);
    }

    function drawMesh() {
      ctx.save();
      ctx.strokeStyle = "rgba(0,220,180,0.6)";
      ctx.lineWidth = 0.5;

      for (const c of cells) {
        ctx.strokeRect(c.x, c.y, c.w, c.h);
      }

      ctx.restore();
    }

    function drawPoly() {
      ctx.save();
      ctx.strokeStyle = "rgba(255,90,90,0.8)";
      ctx.lineWidth = 0.5;

      for (const c of cells) {
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(c.x + c.w, c.y);
        ctx.lineTo(c.x + c.w, c.y + c.h);
        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(c.x + c.w, c.y + c.h);
        ctx.lineTo(c.x, c.y + c.h);
        ctx.closePath();
        ctx.stroke();
      }

      ctx.restore();
    }

    function loop(now) {
      if (document.hidden) {
        isAnim = false;
        animId = null;
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const rp of ripples) {
        rp.update();
        rp.draw();
      }

      ripples = ripples.filter(r => !r.dead());

      let moving = false;

      for (const c of cells) {
        c.update();
        c.snap();
        c.draw();
        if (c.moving()) moving = true;
      }

      if (cfg.showMesh) drawMesh();
      if (cfg.showPoly) drawPoly();

      if (moving || ripples.length || now < keepUntil) {
        animId = requestAnimationFrame(loop);
      } else {
        isAnim = false;
        animId = null;
      }
    }

    function markActive(ms = 180) {
      keepUntil = performance.now() + ms;
      if (!isAnim) {
        isAnim = true;
        animId = requestAnimationFrame(loop);
      }
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth - PANEL_W;
      canvas.height = window.innerHeight;

      if (currentImg) buildFromImage(currentImg);
      markActive();
    }

    canvas.addEventListener("mousemove", e => {
      const p = getCanvasMouse(e);
      mouse.x = p.x;
      mouse.y = p.y;
      mouse.active = true;
      markActive();
    });

    canvas.addEventListener("mouseenter", () => {
      mouse.active = true;
      markActive();
    });

    canvas.addEventListener("mouseleave", () => {
      mouse.x = -90000;
      mouse.y = -90000;
      mouse.active = false;
      markActive();
    });

    canvas.addEventListener("click", e => {
      const p = getCanvasMouse(e);
      ripples.push(new Ripple(p.x, p.y));

      if (ripples.length > cfg.maxRipples) {
        ripples.shift();
      }

      markActive(350);
    });

    window.addEventListener("resize", resizeCanvas);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) markActive(250);
    });

    const fileInput = document.getElementById("fileInput");
    fileInput.addEventListener("change", ev => {
      const file = ev.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          resizeCanvas();
          buildFromImage(img);
        };
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
      ev.target.value = "";
    });

    resizeCanvas();
    updateStats();

    const defImg = new Image();
    defImg.onload = () => buildFromImage(defImg);
    defImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAQAAAC1+jfqAAAAxElEQVR4AWP4z8DA8J+BgYHhPwMDA8P/BgaG/y8MDAz/f2BgYPjPwMDA/38GBgb+PwYGBv4/Ghoa/j8GBgb+PwwMDD8wMDAw/AcGBv4fBgYG/j8MDAz/PwMDA/8fBgYG/j8DAwP/PwYGBv4/BgYG/j8GBgb+PwMDA/8/BgYG/j8MDAz/PwYGBv4/BgYG/j8DAwP/PwMDA/8/BgYG/j8DAwP/PwYGBv4/BgYG/j8MDAz/PwMDA/8AANM3E5v2Y4rKAAAAAElFTkSuQmCC";
  </script>
</body>
</html>
